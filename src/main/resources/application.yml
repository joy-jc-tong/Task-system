spring:
  application:
    name: task-system
  
  # JPA/Hibernate 設定
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQL8Dialect
  
  # 資料庫設定 - 開發環境使用 H2
  datasource:
    url: jdbc:h2:mem:taskdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password: 
  
  # H2 Console 設定
  h2:
    console:
      enabled: true
      path: /h2-console

# 日誌設定
logging:
  level:
    root: INFO
    com.example.tasksystem: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# Server 設定
server:
  port: 8080
  servlet:
    context-path: /api
