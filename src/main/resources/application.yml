spring:
  application:
    name: task-system
  
  # JPA/Hibernate 設定
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  
  # 資料庫設定 - 使用 PostgreSQL
  datasource:
    url: jdbc:postgresql://localhost:5432/taskdb
    driver-class-name: org.postgresql.Driver
    username: postgres
    password: postgres
  
  # H2 Console 設定
  h2:
    console:
      enabled: true
      path: /h2-console

# 日誌設定
logging:
  level:
    root: INFO
    com.example.tasksystem: DEBUG
    org.springframework.web: INFO
    org.hibernate.SQL: DEBUG

# Server 設定
server:
  port: 8080
  servlet:
    context-path: /api
